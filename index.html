<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тулпар: Точный Сканер</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background-color: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            border: none !important;
            border-radius: 12px;
            overflow: hidden;
            background-color: #0f172a;
        }

        /* Кастомизация встроенных кнопки библиотеки */
        #reader button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 12px 0;
            transition: background-color 0.2s;
        }
        #reader button:hover {
            background-color: #7dd3fc;
        }

        #result-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        #bus-number {
            font-size: 4.5rem;
            font-weight: 900;
            color: #4ade80;
            margin: 8px 0;
            line-height: 1;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
        }

        #debug-info {
            font-size: 0.75rem;
            color: #475569;
            word-break: break-all;
            margin-top: 12px;
            border-top: 1px dashed #334155;
            padding-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Тулпар • Сканер кода</h1>
        <p>Автоматически извлекает бортовой номер автобуса</p>
        
        <div id="reader"></div>

        <div id="result-box">
            <div class="label">Код транспорта</div>
            <div id="bus-number">---</div>
            <div id="debug-info">Ожидание сканирования...</div>
        </div>
    </div>

    <script>
        // Алгоритм разбора ссылки на основе реальных данных Тулпар / PayQR
        function extractBusCode(rawUrl) {
            // Если это не ссылка Тулпара, прерываем работу
            if (!rawUrl.includes("qr.tulpar.kg")) {
                return null;
            }

            // Находим всё, что идет строго после подстроки "qr.tulpar.kg"
            const parts = rawUrl.split("qr.tulpar.kg");
            if (parts.length < 2) return null;

            const dataAfterDomain = parts[1]; // Получаем строчку типа: "10032971120212130..."

            // Определяем, какой префикс длины используется в этой наклейке
            let prefix = "";
            if (dataAfterDomain.startsWith("1003")) prefix = "1003";
            else if (dataAfterDomain.startsWith("1004")) prefix = "1004";

            if (!prefix) return null;

            // Отрезаем этот технический префикс
            const withoutPrefix = dataAfterDomain.substring(prefix.length); // Остаётся: "29711202121..." или "3951202121..."

            // Ищем индекс начала неизменяемого системного хвоста "1202121"
            const tailIndex = withoutPrefix.indexOf("1202121");
            if (tailIndex === -1) return null;

            // Забираем всё, что находится ровно МЕЖДУ префиксом и системным хвостом
            const busCode = withoutPrefix.substring(0, tailIndex);

            return busCode;
        }

        function onScanSuccess(decodedText) {
            const debugDiv = document.getElementById('debug-info');
            const resultDiv = document.getElementById('bus-number');

            debugDiv.innerText = "QR обнаружен. Расшифровка...";

            // Применяем логику очистки
            const busCode = extractBusCode(decodedText);

            if (busCode) {
                resultDiv.innerText = busCode; // Выводим чистые 395, 1515, 2971 и т.д.
                debugDiv.innerText = "Успешно распознано!";
                
                // Легкий виброотклик смартфона
                if (navigator.vibrate) {
                    navigator.vibrate(150);
                }
            } else {
                resultDiv.innerText = "???";
                debugDiv.innerText = "Ошибка: Неверный формат данных внутри QR.";
            }
        }

        function onScanFailure(error) {
            // Пустой блок, чтобы библиотека не спамила в консоль каждую миллисекунду
        }

        // Настройка сканера
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 15, // Скорость обработки кадров
                qrbox: { width: 260, height: 260 }, // Рамка прицела
                // Принудительно заставляем браузер брать заднюю 1х камеру без лишних вопросов
                videoConstraints: {
                    facingMode: { exact: "environment" }
                },
                rememberLastUsedCamera: true
            },
            /* verbose= */ false
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
