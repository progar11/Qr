<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тулпар: Точный Сканер</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* ОКНО 1: ПОЛНОЭКРАННЫЙ СКАНЕР */
        #scanner-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Полностью зачищаем любые возможные элементы интерфейса библиотеки */
        #reader__scan_region, 
        #reader__scan_region div,
        #reader__scan_region canvas,
        #reader__dashboard, 
        #reader button {
            display: none !important;
            opacity: 0 !important;
            border: none !important;
            background: none !important;
            box-shadow: none !important;
        }

        /* НАШ СОБСТВЕННЫЙ РОЗОВЫЙ ПРИЦЕЛ С РАЗРЫВАМИ (Сдвинут выше центра) */
        .camera-aim-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            pointer-events: none;
            z-index: 999; /* Выносим на самый верхний слой */
        }

        /* Создаем розовые уголки с разрывами и скруглением */
        .purple-corner {
            position: absolute;
            width: 35px;
            height: 35px;
            border-color: #e91e63; /* Розовый цвет */
            border-style: solid;
            border-width: 0;
        }

        .top-left     { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 24px; }
        .top-right    { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 24px; }
        .bottom-left  { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 24px; }
        .bottom-right { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 24px; }

        /* ПАНЕЛЬ С ТВОИМ ФОТО: На всю ширину экрана в самом низу */
        .bottom-photo-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 6;
            pointer-events: none;
            line-height: 0;
        }

        .user-full-width-photo {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* ОКНО 2: ЭКРАН ВЫВОДА РЕЗУЛЬТАТА */
        #result-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background-color: #0f172a;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .label {
            font-size: 1.1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        #bus-number {
            font-size: 6.5rem;
            font-weight: 900;
            color: #4ade80;
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.25);
        }

        .reset-btn {
            margin-top: 50px;
            background-color: #334155;
            color: #f8fafc;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            pointer-events: auto;
        }
        .reset-btn:active {
            background-color: #475569;
        }
    </style>
</head>
<body>

    <div id="scanner-window">
        <div id="reader"></div>
        
        <div class="camera-aim-container">
            <div class="purple-corner top-left"></div>
            <div class="purple-corner top-right"></div>
            <div class="purple-corner bottom-left"></div>
            <div class="purple-corner bottom-right"></div>
        </div>
        
        <div class="bottom-photo-panel">
            <img src="foto.jpg" alt="Нижняя панель" class="user-full-width-photo" onerror="this.style.display='none';">
        </div>
    </div>

    <div id="result-window">
        <div class="label">Код автобуса</div>
        <div id="bus-number">---</div>
        <button class="reset-btn" onclick="resetScanner()">Сканировать снова</button>
    </div>

    <script>
        let html5QrCode;

        function extractBusCode(rawUrl) {
            if (!rawUrl.includes("qr.tulpar.kg")) return null;

            const parts = rawUrl.split("qr.tulpar.kg");
            if (parts.length < 2) return null;

            const dataAfterDomain = parts[1];
            let prefix = "";
            if (dataAfterDomain.startsWith("1003")) prefix = "1003";
            else if (dataAfterDomain.startsWith("1004")) prefix = "1004";

            if (!prefix) return null;

            const withoutPrefix = dataAfterDomain.substring(prefix.length);
            const tailIndex = withoutPrefix.indexOf("1202121");
            if (tailIndex === -1) return null;

            return withoutPrefix.substring(0, tailIndex);
        }

        function onScanSuccess(decodedText) {
            const busCode = extractBusCode(decodedText);

            if (busCode) {
                if (navigator.vibrate) navigator.vibrate(150);

                html5QrCode.stop().then(() => {
                    document.getElementById('bus-number').innerText = busCode;
                    document.getElementById('scanner-window').style.display = 'none';
                    document.getElementById('result-window').style.display = 'flex';
                }).catch(err => console.error("Ошибка при остановке камеры:", err));
            }
        }

        function resetScanner() {
            document.getElementById('result-window').style.display = 'none';
            document.getElementById('scanner-window').style.display = 'block';
            startCamera();
        }

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");

            // Функция, которая отключает прорисовку белого прицела самой библиотеки
            const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
                return {
                    width: viewfinderWidth,
                    height: viewfinderHeight
                };
            }

            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    let targetCameraId = null;

                    // Поиск камеры 1х (игнорируем ультраширокий объектив)
                    const mainCamera = devices.find(device => 
                        device.label.toLowerCase().includes('main') || 
                        device.label.toLowerCase().includes('back 0')
                    );

                    if (mainCamera) {
                        targetCameraId = mainCamera.id;
                    } else {
                        const backCameras = devices.filter(device => device.label.toLowerCase().includes('back'));
                        targetCameraId = backCameras.length > 0 ? backCameras[0].id : devices[0].id;
                    }

                    html5QrCode.start(
                        targetCameraId,
                        {
                            fps: 15,
                            qrbox: qrboxFunction // Передаем функцию полного экрана вместо фиксированного размера квадрата
                        },
                        onScanSuccess
                    ).catch(err => {
                        fallbackStart(qrboxFunction);
                    });

                } else {
                    fallbackStart(qrboxFunction);
                }
            }).catch(err => {
                fallbackStart(qrboxFunction);
            });
        }

        function fallbackStart(qrboxFn) {
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: qrboxFn },
                onScanSuccess
            );
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
