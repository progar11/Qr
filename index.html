<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тулпар: Полноэкранный сканер</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* ОКНО 1: ПОЛНОЭКРАННЫЙ СКАНЕР */
        #scanner-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block; /* Показывается изначально */
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Скрываем все стандартные кнопки и текст самой библиотеки */
        #reader__scan_region, #reader__dashboard, #reader button {
            display: none !important;
        }

        /* Прозрачный прицел по центру экрана для удобства */
        .camera-aim {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            pointer-events: none;
        }


        /* ОКНО 2: ЭКРАН РЕЗУЛЬТАТА (Изначально скрыт) */
        #result-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-color: #0f172a; /* Приятный глубокий темный цвет */
            display: none; /* Скрыт, пока нет успешного сканирования */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .label {
            font-size: 1.1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        #bus-number {
            font-size: 6.5rem;
            font-weight: 900;
            color: #4ade80; /* Яркий зеленый номер */
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.25);
        }

        /* Кнопка «Назад», если захочется отсканировать другой автобус */
        .reset-btn {
            margin-top: 50px;
            background-color: #334155;
            color: #f8fafc;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .reset-btn:active {
            background-color: #475569;
        }
    </style>
</head>
<body>

    <div id="scanner-window">
        <div id="reader"></div>
        <div class="camera-aim"></div> </div>

    <div id="result-window">
        <div class="label">Код автобуса</div>
        <div id="bus-number">---</div>
        <button class="reset-btn" onclick="resetScanner()">Сканировать снова</button>
    </div>

    <script>
        let html5QrCode;

        // Логика разбора ссылки Тулпар
        function extractBusCode(rawUrl) {
            if (!rawUrl.includes("qr.tulpar.kg")) return null;

            const parts = rawUrl.split("qr.tulpar.kg");
            if (parts.length < 2) return null;

            const dataAfterDomain = parts[1];
            let prefix = "";
            if (dataAfterDomain.startsWith("1003")) prefix = "1003";
            else if (dataAfterDomain.startsWith("1004")) prefix = "1004";

            if (!prefix) return null;

            const withoutPrefix = dataAfterDomain.substring(prefix.length);
            const tailIndex = withoutPrefix.indexOf("1202121");
            if (tailIndex === -1) return null;

            return withoutPrefix.substring(0, tailIndex);
        }

        function onScanSuccess(decodedText) {
            const busCode = extractBusCode(decodedText);

            if (busCode) {
                // 1. Телефон коротко вибрирует
                if (navigator.vibrate) navigator.vibrate(150);

                // 2. Останавливаем камеру, чтобы не тратить батарею
                html5QrCode.stop().then(() => {
                    
                    // 3. Подставляем номер автобуса в окно результата
                    document.getElementById('bus-number').innerText = busCode;
                    
                    // 4. Прячем окно камеры и показываем окно с номером
                    document.getElementById('scanner-window').style.display = 'none';
                    document.getElementById('result-window').style.display = 'flex';
                    
                }).catch(err => console.error("Ошибка остановки камеры:", err));
            }
        }

        // Функция для кнопки «Сканировать снова»
        function resetScanner() {
            // Переключаем окна обратно
            document.getElementById('result-window').style.display = 'none';
            document.getElementById('scanner-window').style.display = 'block';
            
            // Запускаем камеру заново
            startCamera();
        }

        // Функция запуска камеры
        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: { exact: "environment" } }, // Жестко задняя основная камера
                {
                    fps: 15,
                    qrbox: 250 // Область сканирования внутри прицела
                },
                onScanSuccess
            ).catch(err => {
                console.log("Режим 'exact' не поддерживается, мягкий запуск камеры...");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: 250 },
                    onScanSuccess
                );
            });
        }

        // Запуск при открытии страницы
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
