<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тулпар: Кастомный Сканер</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* ОКНО 1: ПОЛНОЭКРАННЫЙ СКАНЕР */
        #scanner-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Скрываем мусорные кнопки библиотеки */
        #reader__scan_region, #reader__dashboard, #reader button {
            display: none !important;
        }

        /* Фиолетовый скругленный прицел, сдвинутый чуть выше центра */
        .camera-aim {
            position: absolute;
            top: 40%; /* Сдвинули выше (было 50%) */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 3px solid #8b5cf6; /* Красивый фиолетовый цвет */
            border-radius: 24px; /* Мягкое скругление углов */
            pointer-events: none;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        /* Блок с твоим фото в самом низу экрана сканера */
        .user-photo-container {
            position: absolute;
            bottom: 40px; /* Прижали к самому низу */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
            pointer-events: none;
        }

        .user-avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid #8b5cf6; /* Фиолетовый ободок для фото */
            object-fit: cover;
            background-color: #222; /* Фон, пока фотка загружается */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }


        /* ОКНО 2: ЭКРАН РЕЗУЛЬТАТА (Отдельное окно после сканирования) */
        #result-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-color: #0f172a;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .label {
            font-size: 1.1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        #bus-number {
            font-size: 6.5rem;
            font-weight: 900;
            color: #4ade80; /* Зеленый цвет для готового кода */
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.25);
        }

        .reset-btn {
            margin-top: 50px;
            background-color: #334155;
            color: #f8fafc;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            pointer-events: auto;
        }
        .reset-btn:active {
            background-color: #475569;
        }
    </style>
</head>
<body>

    <div id="scanner-window">
        <div id="reader"></div>
        <div class="camera-aim"></div> <div class="user-photo-container">
            <img src="foto.jpg" alt="Фото" class="user-avatar" onerror="this.style.display='none'; alert('Положи файл foto.jpg в папку с сайтом!');">
        </div>
    </div>

    <div id="result-window">
        <div class="label">Код автобуса</div>
        <div id="bus-number">---</div>
        <button class="reset-btn" onclick="resetScanner()">Сканировать снова</button>
    </div>

    <script>
        let html5QrCode;

        // Наша точная математика разбора строк
        function extractBusCode(rawUrl) {
            if (!rawUrl.includes("qr.tulpar.kg")) return null;

            const parts = rawUrl.split("qr.tulpar.kg");
            if (parts.length < 2) return null;

            const dataAfterDomain = parts[1];
            let prefix = "";
            if (dataAfterDomain.startsWith("1003")) prefix = "1003";
            else if (dataAfterDomain.startsWith("1004")) prefix = "1004";

            if (!prefix) return null;

            const withoutPrefix = dataAfterDomain.substring(prefix.length);
            const tailIndex = withoutPrefix.indexOf("1202121");
            if (tailIndex === -1) return null;

            return withoutPrefix.substring(0, tailIndex);
        }

        function onScanSuccess(decodedText) {
            const busCode = extractBusCode(decodedText);

            if (busCode) {
                if (navigator.vibrate) navigator.vibrate(150);

                // Выключаем камеру и переключаем окно на результат
                html5QrCode.stop().then(() => {
                    document.getElementById('bus-number').innerText = busCode;
                    document.getElementById('scanner-window').style.display = 'none';
                    document.getElementById('result-window').style.display = 'flex';
                }).catch(err => console.error("Ошибка остановки камеры:", err));
            }
        }

        function resetScanner() {
            document.getElementById('result-window').style.display = 'none';
            document.getElementById('scanner-window').style.display = 'block';
            startCamera();
        }

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: { exact: "environment" } }, // Задняя основная камера
                {
                    fps: 15,
                    qrbox: 260
                },
                onScanSuccess
            ).catch(err => {
                console.log("Мягкий запуск камеры...");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: 260 },
                    onScanSuccess
                );
            });
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
